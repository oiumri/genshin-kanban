<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genshin Ultimate Archive 3.0 - Horizontal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #16161c; color: #eee; margin: 0; padding: 30px; font-size: 18px; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3f3f50; padding-bottom: 15px; margin-bottom: 30px; }
        
        #calc { display: none; position: fixed; right: 30px; top: 90px; width: 280px; background: #23232d; border: 1px solid #d3bc8e; border-radius: 12px; padding: 20px; z-index: 3000; box-shadow: 0 10px 50px rgba(0,0,0,0.9); }
        #calc.active { display: block; }
        #calc input { width: 100%; background: #16161c; border: 1px solid #444; color: #d3bc8e; padding: 12px; margin-bottom: 15px; border-radius: 8px; text-align: right; font-size: 22px; box-sizing: border-box; }
        .calc-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-btns button { padding: 15px; background: #3f3f50; border: none; color: white; border-radius: 6px; cursor: pointer; font-size: 18px; }

        .section { margin-bottom: 40px; padding: 25px; border-radius: 20px; background: rgba(255,255,255,0.02); min-height: 250px; }
        .section-header { color: #d3bc8e; margin-bottom: 20px; font-size: 22px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .char-grid { display: flex; gap: 20px; flex-wrap: wrap; }

        .char-card { width: 150px; height: 200px; border-radius: 15px; cursor: grab; transition: 0.2s; display: flex; flex-direction: column; align-items: center; padding-top: 20px; position: relative; overflow: hidden; }
        .rarity-5 { background: linear-gradient(180deg, #815b35, #ffac54); }
        .rarity-4 { background: linear-gradient(180deg, #514170, #8a59cc); }
        .char-icon { width: 110px; height: 110px; border-radius: 50%; background: #2b2b36; object-fit: cover; border: 3px solid rgba(255,255,255,0.3); }
        .char-name { margin-top: 10px; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 3px black; }
        .char-lvl { position: absolute; bottom: 10px; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 12px; font-size: 11px; color: #d3bc8e; border: 1px solid #d3bc8e; }

        .add-btn { width: 150px; height: 200px; border: 3px dashed #3f3f50; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 50px; cursor: pointer; color: #3f3f50; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #1e1e26; width: 1150px; padding: 35px; border-radius: 20px; display: grid; grid-template-columns: 1fr; gap: 30px; max-height: 95vh; overflow-y: auto; border: 1px solid #3f3f50; }
        
        /* ГОРИЗОНТАЛЬНЫЙ РЯД СЛОТОВ */
        .equipment-row { display: flex; flex-wrap: wrap; gap: 25px; align-items: flex-start; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; }
        .slot-item { display: flex; align-items: center; gap: 15px; }
        .slot { width: 90px; height: 90px; background: #16161c; border-radius: 12px; border: 1px solid #3f3f50; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; position: relative; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot-label { position: absolute; bottom: 0; background: rgba(0,0,0,0.7); width: 100%; text-align: center; color: #eee; font-size: 11px; padding: 3px 0; }
        .slot-text { font-size: 18px; font-weight: bold; color: #d3bc8e; max-width: 150px; }

        .add-set-btn { background: #3f3f50; color: #d3bc8e; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 20px; }

        .res-group { display: flex; gap: 12px; }
        .res-slot { width: 80px; height: 80px; background: #111; border-radius: 10px; border: 1px solid #444; overflow: hidden; position: relative; }
        .res-slot img { width: 100%; height: 100%; object-fit: cover; }

        /* КОЛОНКИ КОНТЕНТА */
        .main-layout { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }

        details { background: #1a1a24; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
        summary { cursor: pointer; color: #d3bc8e; font-weight: bold; font-size: 18px; }
        .detail-text { padding: 10px; white-space: pre-wrap; color: #ccc; font-size: 16px; line-height: 1.6; }

        .team-box { background: #16161c; padding: 25px; border-radius: 15px; display: flex; justify-content: space-around; border: 1px solid #3f3f50; margin-top: 10px; }
        .teammate { display: flex; flex-direction: column; align-items: center; width: 220px; }
        .tm-icon { width: 90px; height: 90px; border-radius: 50%; background: #333; margin-bottom: 12px; border: 2px solid #444; }
        .tm-gear-row { display: flex; gap: 8px; }
        .tm-slot { width: 50px; height: 50px; background: #222; border: 1px solid #444; border-radius: 6px; overflow: hidden; position: relative; }

        .edit-panel { display: none; background: #2a2a35; padding: 30px; border-radius: 15px; border: 1px solid #d3bc8e; margin-bottom: 20px; }
        .edit-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        input, textarea, select { background: #16161c; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; font-size: 15px; width: 100%; box-sizing: border-box; }
        .btn-toggle-calc { background: #1a1a24; color: #d3bc8e; border: 1px solid #d3bc8e; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h2 style="color: #d3bc8e; margin: 0; letter-spacing: 3px;">GENSHIN MASTER ARCHIVE</h2>
        <button class="btn-toggle-calc" onclick="toggleCalc()">[ 123 ] 🧮</button>
    </header>

    <div id="calc">
        <input type="text" id="calcDisplay" readonly value="0">
        <div class="calc-btns">
            <button onclick="calcClear()">C</button>
            <button onclick="calcIn('/')">/</button><button onclick="calcIn('*')">*</button><button onclick="calcIn('-')">-</button>
            <button onclick="calcIn('7')">7</button><button onclick="calcIn('8')">8</button><button onclick="calcIn('9')">9</button>
            <button onclick="calcIn('+')">+</button><button onclick="calcIn('4')">4</button><button onclick="calcIn('5')">5</button>
            <button onclick="calcIn('6')">6</button><button onclick="calcEval()" style="grid-row: span 2; background: #d3bc8e; color:#16161c; font-weight:bold">=</button>
            <button onclick="calcIn('1')">1</button><button onclick="calcIn('2')">2</button><button onclick="calcIn('3')">3</button>
            <button onclick="calcIn('0')" style="grid-column: span 2;">0</button><button onclick="calcIn('.')">.</button>
        </div>
    </div>

    <div class="section" id="priority" ondrop="drop(event, 'priority')" ondragover="allowDrop(event)">
        <div class="section-header">🔥 ПРИОРИТЕТ & ФАРМ</div>
        <div class="char-grid" id="grid-priority"></div>
    </div>
    <div class="section" id="built" ondrop="drop(event, 'built')" ondragover="allowDrop(event)">
        <div class="section-header">✅ СОБРАНЫ</div>
        <div class="char-grid" id="grid-built"></div>
    </div>
    <div class="section" id="other" ondrop="drop(event, 'other')" ondragover="allowDrop(event)">
        <div class="section-header">💤 В ЗАПАСЕ</div>
        <div class="char-grid" id="grid-other"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 15px;">
                <h2 id="mName" style="color:#d3bc8e; margin:0"></h2>
                <div>
                    <button onclick="toggleEdit()" style="padding: 10px 20px; cursor:pointer">⚙️ РЕДАКТИРОВАТЬ</button>
                    <button onclick="closeModal()" style="background:none; border:none; color:#888; font-size:40px; cursor:pointer; margin-left:20px">×</button>
                </div>
            </div>

            <div class="edit-panel" id="editPanel">
                <div class="edit-grid">
                    <div class="edit-col">
                        <label>ОСНОВНОЕ</label>
                        <input type="text" id="eName"><input type="text" id="eImg"><input type="text" id="eLvl">
                        <select id="eRar"><option value="rarity-5">5★</option><option value="rarity-4">4★</option></select>
                        <label>СНАРЯЖЕНИЕ + ТЕКСТ</label>
                        <input type="text" id="eW" placeholder="Оружие URL"><input type="text" id="eWt" placeholder="Название оружия">
                        <input type="text" id="eA1" placeholder="Сет 1 URL"><input type="text" id="eA1t" placeholder="Название сета 1">
                        <input type="text" id="eA2" placeholder="Сет 2 URL"><input type="text" id="eA2t" placeholder="Название сета 2">
                        <input type="text" id="eB" placeholder="Босс URL"><input type="text" id="eBk" placeholder="Книги URL">
                    </div>
                    <div class="edit-col">
                        <label>АРТЕФАКТЫ (СТАТЫ)</label>
                        <input type="text" id="eAF" placeholder="Перо"><input type="text" id="eAL" placeholder="Цветок">
                        <input type="text" id="eAS" placeholder="Часы"><input type="text" id="eAC" placeholder="Кубок">
                        <input type="text" id="eAH" placeholder="Шапка">
                    </div>
                    <div class="edit-col">
                        <label>ТЕКСТЫ</label>
                        <textarea id="eRot" rows="7"></textarea><textarea id="eNotes" rows="7"></textarea>
                    </div>
                    <div class="edit-col">
                        <label>ОТРЯД</label>
                        <div style="background:#16161c; padding:8px; border-radius:6px; margin-bottom:10px">
                            <input type="text" id="eS1n"><input type="text" id="eS1i"><input type="text" id="eS1w"><input type="text" id="eS1s">
                        </div>
                        <div style="background:#16161c; padding:8px; border-radius:6px; margin-bottom:10px">
                            <input type="text" id="eS2n"><input type="text" id="eS2i"><input type="text" id="eS2w"><input type="text" id="eS2s">
                        </div>
                        <div style="background:#16161c; padding:8px; border-radius:6px">
                            <input type="text" id="eS3n"><input type="text" id="eS3i"><input type="text" id="eS3w"><input type="text" id="eS3s">
                        </div>
                    </div>
                </div>
                <button onclick="saveData()" style="width:100%; margin-top:20px; background:#d3bc8e; padding:15px; font-weight:bold; border:none; cursor:pointer">СОХРАНИТЬ ВСЁ</button>
                <button onclick="deleteChar()" style="width:100%; margin-top:10px; background:#ff4444; color:white; border:none; padding:10px; cursor:pointer">УДАЛИТЬ ПЕРСОНАЖА</button>
            </div>

            <div class="equipment-row">
                <div class="slot-item"><div class="slot" id="vW"></div><div class="slot-text" id="vWt"></div></div>
                
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="slot-item"><div class="slot" id="vA1"></div><div class="slot-text" id="vA1t"></div></div>
                    <button class="add-set-btn" id="btnPlusSet" onclick="toggleSet2()">+</button>
                    <div class="slot-item" id="wrapA2" style="display:none"><div class="slot" id="vA2"></div><div class="slot-text" id="vA2t"></div></div>
                </div>

                <div class="res-group">
                    <div class="res-slot" id="vB"></div><div class="res-slot" id="vBk"></div>
                </div>
            </div>

            <div class="main-layout">
                <div id="viewLeft">
                    <div id="vTodos" style="background:#16161c; padding:20px; border-radius:15px; min-height:150px; margin-bottom:20px"></div>
                    <input type="text" id="newTodo" placeholder="+ Добавить задачу..." onkeydown="if(event.key==='Enter') addTodo()">
                    
                    <div class="team-box">
                        <div class="teammate"><img class="tm-icon" id="vS1i"><b id="vS1n"></b><div class="tm-gear-row"><div class="tm-slot" id="vS1w"></div><div class="tm-slot" id="vS1s"></div></div></div>
                        <div class="teammate"><img class="tm-icon" id="vS2i"><b id="vS2n"></b><div class="tm-gear-row"><div class="tm-slot" id="vS2w"></div><div class="tm-slot" id="vS2s"></div></div></div>
                        <div class="teammate"><img class="tm-icon" id="vS3i"><b id="vS3n"></b><div class="tm-gear-row"><div class="tm-slot" id="vS3w"></div><div class="tm-slot" id="vS3s"></div></div></div>
                    </div>
                </div>

                <div id="viewRight">
                    <details open><summary>АРТЕФАКТЫ (СТАТЫ)</summary><div class="detail-text" id="vArts"></div></details>
                    <details><summary>РОТАЦИЯ</summary><div class="detail-text" id="vRot"></div></details>
                    <details><summary>ЗАМЕТКИ</summary><div class="detail-text" id="vNotes"></div></details>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('genshin_ultra_db')) || [];
        let curId = null;

        function renderGrid() {
            ['priority', 'built', 'other'].forEach(type => {
                const grid = document.getElementById(`grid-${type}`);
                grid.innerHTML = `<div class="add-btn" onclick="addNew('${type}')">+</div>`;
                db.filter(c => (c.status || 'other') === type).forEach(c => {
                    grid.innerHTML += `<div class="char-card ${c.rarity}" draggable="true" ondragstart="drag(event, ${c.id})" onclick="openModal(${c.id})"><img src="${c.img || ''}" class="char-icon" onerror="this.style.opacity='0'"><div class="char-name">${c.name}</div><div class="char-lvl">${c.lvl}</div></div>`;
                });
            });
            localStorage.setItem('genshin_ultra_db', JSON.stringify(db));
        }

        function drag(ev, id) { ev.dataTransfer.setData("charId", id); }
        function allowDrop(ev) { ev.preventDefault(); }
        function drop(ev, newStatus) {
            ev.preventDefault(); const id = ev.dataTransfer.getData("charId");
            const char = db.find(x => x.id == id);
            if(char) { char.status = newStatus; renderGrid(); }
        }

        function addNew(status) {
            const n = { id: Date.now(), name: 'Новый герой', rarity: 'rarity-5', lvl: '1 | C0', status: status, todos: [] };
            db.push(n); renderGrid(); openModal(n.id); toggleEdit();
        }

        function openModal(id) {
            curId = id; const c = db.find(x => x.id === id);
            document.getElementById('mName').innerText = c.name;
            document.getElementById('editPanel').style.display = 'none';
            document.getElementById('wrapA2').style.display = 'none';
            document.getElementById('btnPlusSet').innerText = '+';
            
            setSlot('vW', c.w, 'Оружие'); document.getElementById('vWt').innerText = c.wt || '';
            setSlot('vA1', c.a1, 'Сет 1'); document.getElementById('vA1t').innerText = c.a1t || '';
            setSlot('vA2', c.a2, 'Сет 2'); document.getElementById('vA2t').innerText = c.a2t || '';
            
            // Если второй сет заполнен, показываем его сразу
            if(c.a2 || c.a2t) toggleSet2();

            setSlot('vB', c.b, 'Босс'); setSlot('vBk', c.bk, 'Книги');

            document.getElementById('vArts').innerText = `ПЕРО: ${c.af||'—'}\nЦВЕТОК: ${c.al||'—'}\nЧАСЫ: ${c.as||'—'}\nКУБОК: ${c.ac||'—'}\nШАПКА: ${c.ah||'—'}`;
            document.getElementById('vRot').innerText = c.rot || '—';
            document.getElementById('vNotes').innerText = c.notes || '—';

            for(let i=1; i<=3; i++) {
                document.getElementById(`vS${i}n`).innerText = c[`s${i}n`] || `S${i}`;
                document.getElementById(`vS${i}i`).src = c[`s${i}i`] || '';
                setSlot(`vS${i}w`, c[`s${i}w`], ''); setSlot(`vS${i}s`, c[`s${i}s`], '');
            }
            renderTodos();
            document.getElementById('modal').style.display = 'flex';
        }

        function toggleSet2() {
            const w = document.getElementById('wrapA2');
            const b = document.getElementById('btnPlusSet');
            if(w.style.display === 'none') { w.style.display = 'flex'; b.innerText = '-'; }
            else { w.style.display = 'none'; b.innerText = '+'; }
        }

        function setSlot(id, src, label) {
            const el = document.getElementById(id);
            if(src) el.innerHTML = `<img src="${src}">`;
            else el.innerHTML = label ? `<div class="slot-label">${label}</div>` : '';
        }

        function toggleEdit() {
            const p = document.getElementById('editPanel'); const c = db.find(x => x.id === curId);
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
            if(p.style.display === 'block') {
                const fields = ['Name','Img','Lvl','Rar','W','Wt','A1','A1t','A2','A2t','B','Bk','AF','AL','AS','AC','AH','Rot','Notes','S1n','S1i','S1w','S1s','S2n','S2i','S2w','S2s','S3n','S3i','S3w','S3s'];
                fields.forEach(f => document.getElementById('e'+f).value = c[f.toLowerCase()] || '');
            }
        }

        function saveData() {
            const c = db.find(x => x.id === curId);
            const fields = ['Name','Img','Lvl','Rar','W','Wt','A1','A1t','A2','A2t','B','Bk','AF','AL','AS','AC','AH','Rot','Notes','S1n','S1i','S1w','S1s','S2n','S2i','S2w','S2s','S3n','S3i','S3w','S3s'];
            fields.forEach(f => c[f.toLowerCase()] = document.getElementById('e'+f).value);
            renderGrid(); openModal(curId);
        }

        function renderTodos() {
            const c = db.find(x => x.id === curId); const v = document.getElementById('vTodos'); v.innerHTML = '';
            (c.todos || []).forEach((t, i) => {
                v.innerHTML += `<div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
                    <input type="checkbox" ${t.done?'checked':''} onchange="db.find(x=>x.id===${curId}).todos[${i}].done=!db.find(x=>x.id===${curId}).todos[${i}].done; saveDB(); renderTodos();">
                    <span style="${t.done?'text-decoration:line-through;opacity:0.4':''}">${t.text}</span>
                    <button onclick="db.find(x=>x.id===${curId}).todos.splice(${i},1); saveDB(); renderTodos();" style="margin-left:auto; color:red; cursor:pointer; background:none; border:none; font-size:24px">×</button>
                </div>`;
            });
        }
        function addTodo() {
            const i = document.getElementById('newTodo'); if(!i.value) return;
            db.find(x => x.id === curId).todos.push({text: i.value, done: false});
            i.value = ''; renderTodos(); saveDB();
        }
        function toggleCalc() { document.getElementById('calc').classList.toggle('active'); }
        function calcIn(v) { let d = document.getElementById('calcDisplay'); d.value = d.value === '0' ? v : d.value + v; }
        function calcClear() { document.getElementById('calcDisplay').value = '0'; }
        function calcEval() { try { document.getElementById('calcDisplay').value = eval(document.getElementById('calcDisplay').value); } catch { document.getElementById('calcDisplay').value = 'Error'; } }
        function deleteChar() { if(confirm('Удалить навсегда?')) { db = db.filter(x => x.id !== curId); closeModal(); renderGrid(); } }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function saveDB() { localStorage.setItem('genshin_ultra_db', JSON.stringify(db)); }
        renderGrid();
    </script>
</body>
</html>
